# Dedicated server configuration
bind_address=0.0.0.0
listen_port=27020
simulation_tick_hz=30
snapshot_rate_hz=15
max_clients=64
max_input_frames_per_second=120
max_chunk_hints_per_second=30
max_chunk_resync_requests_per_second=60
metrics_log_interval_seconds=10

# World/chunk replication
world_chunk_width_tiles=64
world_chunk_height_tiles=64
world_tile_size=1
world_interest_radius_chunks=4

auth_mode=dev
enforce_build_hash=false
required_build_hash=0

persistence_path=server_data/world_state.txt

# Authoritative player kinematics (shared with clients in ServerWelcome)
player_max_move_speed=8
player_jump_speed=8
player_gravity=-24
player_max_fall_speed=-48
player_ground_y=0
world_min_x=-256
world_max_x=256

# Local network simulation (disabled by default)
fake_lag_ms=0
fake_jitter_ms=0
fake_loss_send_pct=0
fake_loss_recv_pct=0
